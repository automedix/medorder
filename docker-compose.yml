services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/medorder.db
      - NEXTAUTH_URL=http://87.106.23.237
      - NEXTAUTH_SECRET=medorder-jwt-secret-key-2024-secure
      - ADMIN_EMAIL=${ADMIN_EMAIL:-praxis@hausaerzte-im-grillepark.online}
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app-data:
